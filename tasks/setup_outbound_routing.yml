---

- name: Retrieve the original public gateway for reversal purposes
  ansible.builtin.uri:
    url: "{{ digital_ocean_metadata_public_ipv4_gateway_url }}"
    body_format: raw
    method: GET
    follow_redirects: all
    return_content: true
    status_code:
      - 200
      - -1
    timeout: 60
  register: do_droplet_public_gateway
  retries: 3
  failed_when: false

- name: Store the original public gateway
  ansible.builtin.set_fact:
    original_public_gateway: "{{ do_droplet_public_gateway.content }}"
  when:
    - do_droplet_public_gateway.content | length > 0
    - do_droplet_public_gateway.content != "not found"

- name: Determine the primary interface used for Reserved IP routing
  ansible.builtin.set_fact:
    reserved_ip_routing_interface: >-
      {{ ansible_facts['default_ipv4']['interface'] | default('eth0') }}

- name: Define the temporary known_hosts file for Reserved IP SSH handoff
  ansible.builtin.set_fact:
    reserved_ip_known_hosts_file: >-
      /tmp/ansible-reserved-ip-{{ inventory_hostname | regex_replace('[^A-Za-z0-9_.-]', '_') }}.known_hosts

- name: Wait for SSH to become reachable on the Reserved IP before route cutover
  ansible.builtin.wait_for:
    host: "{{ do_droplet_reserved_ip_address }}"
    port: "{{ ansible_port | default(22) }}"
    delay: 2
    timeout: 120
    state: started
  delegate_to: localhost
  when:
    - can_retrieve_anchor_gateway_associated_to_this_droplet
    - anchor_gateway_associated_to_droplet is defined
    - anchor_gateway_associated_to_droplet | length > 0
    - do_droplet_reserved_ip_address is defined
    - do_droplet_reserved_ip_address | length > 0

- name: Reset the temporary known_hosts file for the Reserved IP
  ansible.builtin.copy:
    content: ''
    dest: "{{ reserved_ip_known_hosts_file }}"
    mode: '0600'
  delegate_to: localhost
  when:
    - can_retrieve_anchor_gateway_associated_to_this_droplet
    - anchor_gateway_associated_to_droplet is defined
    - anchor_gateway_associated_to_droplet | length > 0
    - do_droplet_reserved_ip_address is defined
    - do_droplet_reserved_ip_address | length > 0

- name: Scan SSH host keys for the Reserved IP
  ansible.builtin.command:
    argv:
      - ssh-keyscan
      - -T
      - '30'
      - "{{ do_droplet_reserved_ip_address }}"
  delegate_to: localhost
  register: reserved_ip_host_keys
  changed_when: false
  retries: 5
  delay: 3
  until: reserved_ip_host_keys.stdout | length > 0
  when:
    - can_retrieve_anchor_gateway_associated_to_this_droplet
    - anchor_gateway_associated_to_droplet is defined
    - anchor_gateway_associated_to_droplet | length > 0
    - do_droplet_reserved_ip_address is defined
    - do_droplet_reserved_ip_address | length > 0

- name: Write SSH host keys for the Reserved IP to the temporary known_hosts file
  ansible.builtin.copy:
    content: >-
      {{
        (
          reserved_ip_host_keys.stdout_lines
          | reject('match', '^#')
          | reject('equalto', '')
          | join('\n')
        ) ~ '\n'
      }}
    dest: "{{ reserved_ip_known_hosts_file }}"
    mode: '0600'
  delegate_to: localhost
  when:
    - can_retrieve_anchor_gateway_associated_to_this_droplet
    - anchor_gateway_associated_to_droplet is defined
    - anchor_gateway_associated_to_droplet | length > 0
    - do_droplet_reserved_ip_address is defined
    - do_droplet_reserved_ip_address | length > 0

- name: Switch Ansible management variables to the Reserved IP before route cutover
  ansible.builtin.set_fact:
    ansible_host: "{{ do_droplet_reserved_ip_address }}"
    ansible_ssh_common_args: >-
      {{
        (
          ansible_ssh_common_args | default('')
          ~ ' -o UserKnownHostsFile=' ~ reserved_ip_known_hosts_file
          ~ ' -o StrictHostKeyChecking=no'
        ) | trim
      }}
    ansible_ssh_extra_args: >-
      {{
        (
          ansible_ssh_extra_args | default('')
          ~ ' -o UserKnownHostsFile=' ~ reserved_ip_known_hosts_file
          ~ ' -o StrictHostKeyChecking=no'
        ) | trim
      }}
    ansible_ssh_host: "{{ do_droplet_reserved_ip_address }}"
  when:
    - can_retrieve_anchor_gateway_associated_to_this_droplet
    - anchor_gateway_associated_to_droplet is defined
    - anchor_gateway_associated_to_droplet | length > 0
    - do_droplet_reserved_ip_address is defined
    - do_droplet_reserved_ip_address | length > 0

- name: Reset the SSH connection so subsequent tasks use the Reserved IP
  ansible.builtin.include_tasks: reset_connection.yml
  when:
    - can_retrieve_anchor_gateway_associated_to_this_droplet
    - anchor_gateway_associated_to_droplet is defined
    - anchor_gateway_associated_to_droplet | length > 0
    - do_droplet_reserved_ip_address is defined
    - do_droplet_reserved_ip_address | length > 0

- name: Schedule immediate routing via the anchor gateway
  when:
    - can_retrieve_anchor_gateway_associated_to_this_droplet
    - anchor_gateway_associated_to_droplet is defined
    - anchor_gateway_associated_to_droplet | length > 0
    - ansible_facts['os_family'] != 'RedHat'
  ansible.builtin.shell: |
    nohup /bin/bash -c '
      sleep 2
      ip route del 0/0 || true
      ip route add default via {{ anchor_gateway_associated_to_droplet }} dev {{ reserved_ip_routing_interface }}
    ' >/var/tmp/reserved-ip-route-switch.log 2>&1 </dev/null &
  args:
    executable: /bin/bash
  changed_when: false

- name: Wait for SSH to return on the Reserved IP after route cutover
  ansible.builtin.wait_for:
    host: "{{ do_droplet_reserved_ip_address }}"
    port: "{{ ansible_port | default(22) }}"
    delay: 2
    timeout: 120
    state: started
  delegate_to: localhost
  when:
    - can_retrieve_anchor_gateway_associated_to_this_droplet
    - anchor_gateway_associated_to_droplet is defined
    - anchor_gateway_associated_to_droplet | length > 0
    - do_droplet_reserved_ip_address is defined
    - do_droplet_reserved_ip_address | length > 0
    - ansible_facts['os_family'] != 'RedHat'

- name: Reset the SSH connection after the route cutover completes
  ansible.builtin.include_tasks: reset_connection.yml
  when:
    - can_retrieve_anchor_gateway_associated_to_this_droplet
    - anchor_gateway_associated_to_droplet is defined
    - anchor_gateway_associated_to_droplet | length > 0
    - do_droplet_reserved_ip_address is defined
    - do_droplet_reserved_ip_address | length > 0
    - ansible_facts['os_family'] != 'RedHat'

- name: Apply persistent routing via netplan
  when:
    - can_retrieve_anchor_gateway_associated_to_this_droplet
    - anchor_gateway_associated_to_droplet is defined
    - ansible_facts['os_family'] in ['Debian']
  block:
    - name: Read current netplan configuration
      ansible.builtin.slurp:
        src: /etc/netplan/50-cloud-init.yaml
      register: netplan_content

    - name: Parse netplan YAML
      ansible.builtin.set_fact:
        netplan_config: "{{ netplan_content['content'] | b64decode | from_yaml }}"

    - name: Ensure network section exists
      ansible.builtin.set_fact:
        netplan_config: "{{ netplan_config | combine({'network': {}}, recursive=True) }}"

    - name: Ensure ethernets section exists
      ansible.builtin.set_fact:
        netplan_config: "{{ netplan_config | combine({'network': {'ethernets': {}}}, recursive=True) }}"

    - name: Ensure the primary interface configuration exists
      ansible.builtin.set_fact:
        netplan_config: >-
          {{
            netplan_config
            | combine(
                {'network': {'ethernets': {reserved_ip_routing_interface: {}}}},
                recursive=True
              )
          }}

    - name: Configure the primary interface with routes to anchor gateway
      ansible.builtin.set_fact:
        netplan_config: >-
          {{
            netplan_config
            | combine(
                {
                  'network': {
                    'ethernets': {
                      reserved_ip_routing_interface: {
                        'routes': route_entry
                      }
                    }
                  }
                },
                recursive=True
              )
          }}
      vars:
        route_entry:
          - to: '0.0.0.0/0'
            via: "{{ anchor_gateway_associated_to_droplet }}"
            on-link: true

    - name: Write updated netplan configuration
      ansible.builtin.copy:
        content: "{{ netplan_config | to_nice_yaml }}"
        dest: /etc/netplan/50-cloud-init.yaml
        mode: '0600'
      notify: Apply netplan configuration


- name: Apply persistent routing via NetworkManager on RedHat-family systems
  when:
    - can_retrieve_anchor_gateway_associated_to_this_droplet
    - anchor_gateway_associated_to_droplet is defined
    - ansible_facts['os_family'] in ['RedHat']
  block:
    - name: Discover the active NetworkManager connection for the primary interface
      ansible.builtin.command:
        argv:
          - nmcli
          - -g
          - GENERAL.CONNECTION
          - device
          - show
          - "{{ reserved_ip_routing_interface }}"
      register: redhat_nm_connection
      changed_when: false

    - name: Ensure NetworkManager reported an active connection for the primary interface
      ansible.builtin.assert:
        that:
          - redhat_nm_connection.stdout | trim | length > 0
        fail_msg: >-
          Could not determine the active NetworkManager connection for
          {{ reserved_ip_routing_interface }}, so the RedHat-family Reserved IP
          gateway could not be persisted.

    - name: Read the current IPv4 gateway from the active NetworkManager connection
      ansible.builtin.command:
        argv:
          - nmcli
          - -g
          - ipv4.gateway
          - connection
          - show
          - "{{ redhat_nm_connection.stdout | trim }}"
      register: redhat_nm_gateway
      changed_when: false

    - name: Persist the anchor gateway in the active NetworkManager connection
      community.general.nmcli:
        conn_name: "{{ redhat_nm_connection.stdout | trim }}"
        ifname: "{{ reserved_ip_routing_interface }}"
        gw4: "{{ anchor_gateway_associated_to_droplet }}"
        state: present
      when: redhat_nm_gateway.stdout | trim != anchor_gateway_associated_to_droplet
      notify: Reboot RedHat host to apply Reserved IP routing


- name: Report routing configuration applied
  ansible.builtin.debug:
    msg:
      - "Outbound routing via Reserved IP has been configured."
      - "Current Ansible management address: {{ do_droplet_reserved_ip_address | default(ansible_host | default('unknown')) }}"
      - "Anchor gateway: {{ anchor_gateway_associated_to_droplet }}"
      - "Original public gateway: {{ original_public_gateway | default('unknown') }}"
