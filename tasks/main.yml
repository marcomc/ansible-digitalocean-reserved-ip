---
- name: Resolve effective Reserved IP input
  ansible.builtin.set_fact:
    digital_ocean_effective_reserved_ip: "{{ digital_ocean_reserved_ip }}"

- name: Check if the DigitalOcean droplet exists
  ansible.builtin.uri:
    url: "{{ digital_ocean_api_base_url }}/droplets/{{ digital_ocean_droplet_id }}"
    headers:
      Content-Type: 'application/json'
      Authorization: "Bearer {{ digital_ocean_api_token }}"
    body_format: json
    method: GET
    follow_redirects: all
    return_content: true
    timeout: 60
  delegate_to: localhost
  register: do_droplet_check_json_response

- name: Allocate a Reserved IP when none was provided
  ansible.builtin.import_tasks: assign_new_reserved_ip.yml
  when: digital_ocean_effective_reserved_ip | length == 0

- name: Attach a provided Reserved IP
  ansible.builtin.import_tasks: assign_existing_reserved_ip.yml
  when: digital_ocean_effective_reserved_ip | length > 0

- name: Retrieve post-assignment network metadata for live routing
  ansible.builtin.import_tasks: retrieve_anchor_ip.yml

- name: Configure outbound routing via Reserved IP when enabled
  ansible.builtin.import_tasks: setup_outbound_routing.yml
  when:
    - enable_reserved_ip_outbound_routing | bool
    - reserved_ip_is_assigned_to_this_droplet
