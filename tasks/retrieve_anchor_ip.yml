---

- name: Initialize routing metadata facts
  ansible.builtin.set_fact:
    can_retrieve_anchor_ip_associated_to_this_droplet: false
    can_retrieve_anchor_gateway_associated_to_this_droplet: false

- name: Retrieve the droplet anchor address
  ansible.builtin.uri:
    url: "{{ digital_ocean_metadata_anchor_ipv4_url }}"
    body_format: raw
    method: GET
    follow_redirects: all
    return_content: true
    status_code:
      - 200
      - -1
    timeout: 60
  register: do_droplet_anchor_ip
  when: reserved_ip_is_assigned_to_this_droplet
  retries: 3
  failed_when: false

- name: Mark anchor address retrieval as unavailable when metadata returns no address
  ansible.builtin.set_fact:
    can_retrieve_anchor_ip_associated_to_this_droplet: false
  when:
    - do_droplet_anchor_ip.content | length == 0 or do_droplet_anchor_ip.content == "not found"

- name: Store the retrieved anchor address
  ansible.builtin.set_fact:
    can_retrieve_anchor_ip_associated_to_this_droplet: true
    anchor_ip_associated_to_droplet: "{{ do_droplet_anchor_ip.content }}"
  when:
    - do_droplet_anchor_ip.content | length > 0
    - do_droplet_anchor_ip.content != "not found"

- name: Retrieve the droplet anchor gateway
  ansible.builtin.uri:
    url: "{{ digital_ocean_metadata_anchor_ipv4_gateway_url }}"
    body_format: raw
    method: GET
    follow_redirects: all
    return_content: true
    status_code:
      - 200
      - -1
    timeout: 60
  register: do_droplet_anchor_gateway
  when: reserved_ip_is_assigned_to_this_droplet
  retries: 3
  failed_when: false

- name: Mark anchor gateway retrieval as unavailable when metadata returns no gateway
  ansible.builtin.set_fact:
    can_retrieve_anchor_gateway_associated_to_this_droplet: false
  when:
    - do_droplet_anchor_gateway.content | length == 0 or do_droplet_anchor_gateway.content == "not found"

- name: Store the retrieved anchor gateway
  ansible.builtin.set_fact:
    can_retrieve_anchor_gateway_associated_to_this_droplet: true
    anchor_gateway_associated_to_droplet: "{{ do_droplet_anchor_gateway.content }}"
  when:
    - do_droplet_anchor_gateway.content | length > 0
    - do_droplet_anchor_gateway.content != "not found"

- name: Warn when the anchor gateway metadata cannot be retrieved
  ansible.builtin.debug:
    msg:
      - "It was not possible to retrieve the anchor gateway metadata for this droplet."
      - "The Reserved IP role cannot safely switch the default route without that metadata."
      - "Persistent route configuration is skipped when the anchor gateway is unavailable."
  when: not can_retrieve_anchor_gateway_associated_to_this_droplet

- name: Report that the role intentionally skips legacy NAT rules
  ansible.builtin.debug:
    msg:
      - "This role expects Reserved IP routing to rely on the default route, not host-level SNAT rules."
      - "The role therefore exposes anchor metadata facts without adding SMTP or general TCP iptables NAT rules."
