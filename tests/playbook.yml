---

- hosts: digital-ocean
  connection: local
  gather_facts: false
  serial: 1
  vars:
    ansible_python_interpreter: "python"
    ansible_connection: local
  roles:
    - { role: digital-ocean }

- hosts: digital-ocean
  gather_facts: false
  vars:
    ansible_ssh_extra_args: '-o StrictHostKeyChecking=no'
  tasks:
    - name: Install Python for Ansible requirements
      ansible.builtin.import_tasks: tasks/install_python.yml

- hosts: digital-ocean
  pre_tasks:
    - name: Tag test droplets
      ansible.builtin.include_tasks: tasks/tag_droplets.yml
  roles:
    - { role: inviqa_digitalocean_reserved_ip }

- hosts: digital-ocean
  tasks:
    - name: Run validation tasks
      ansible.builtin.include_tasks: tasks/test_tasks.yml
