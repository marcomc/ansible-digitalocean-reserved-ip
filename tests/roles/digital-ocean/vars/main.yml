---
digital_ocean_api_token: "{{ enc_do_v2_api_key }}"
digital_ocean_size_id: "{{ do_size_id | default('s-1vcpu-1gb') }}"
digital_ocean_image_id: "{{ do_image_id | default('ubuntu-24-04-x64') }}"
digital_ocean_name: "{{ hostname }}"
digital_ocean_region_id: "{{ do_region_id | default('lon1') }}"
digital_ocean_unique_name: "{{ do_unique_name | default(true) }}"
digital_ocean_backups_enabled: "{{ do_backups_enabled | default(false) }}"
digital_ocean_ssh_keys: "{{ do_ssh_keys | default([], true) }}"
