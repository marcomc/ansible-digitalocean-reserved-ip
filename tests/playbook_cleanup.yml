---

- hosts: all
  gather_facts: false
  vars_files:
    - ../defaults/main.yml
  vars:
    ansible_python_interpreter: "python"
    ansible_connection: local
    hostname: "{{ inventory_hostname }}-test-with-ansible"
    enc_do_v2_api_key: "{{ lookup('env', 'DIGITAL_OCEAN_API_TOKEN') }}"
    do_test_tag: "ANSIBLE-TEST"

  tasks:
    - name: Delete test resources
      ansible.builtin.include_tasks: tasks/delete_test_resources.yml
