---

- name: Install Python 3 on CentOS Stream or compatible enterprise Linux
  ansible.builtin.raw: >-
    bash -lc 'if command -v python3 >/dev/null 2>&1; then
      echo python3-present;
    elif command -v dnf >/dev/null 2>&1; then
      dnf -qy install python3;
      echo python3-installed;
    else
      yum -qy install python3;
      echo python3-installed;
    fi'
  register: python_bootstrap_result
  changed_when: "'python3-installed' in python_bootstrap_result.stdout"
  when: "'centos' in inventory_hostname or 'rocky' in inventory_hostname or 'alma' in inventory_hostname"

- name: Install Python 3 on Ubuntu or Debian systems if not present
  ansible.builtin.raw: >-
    bash -lc 'if command -v python3 >/dev/null 2>&1; then
      echo python3-present;
    else
      export DEBIAN_FRONTEND=noninteractive;
      apt-get update -qq;
      apt-get install -qqy python3 python3-apt;
      echo python3-installed;
    fi'
  register: python_bootstrap_result
  changed_when: "'python3-installed' in python_bootstrap_result.stdout"
  when: "'ubuntu' in inventory_hostname or 'debian' in inventory_hostname"
