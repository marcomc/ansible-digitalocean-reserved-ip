---
# Deleting Test Reserved IP

- name: Retrive the list of existing Reserved IPs
  ansible.builtin.import_role:
    name: inviqa_digitalocean_reserved_ip
    tasks_from: list_reserved_ips

- ansible.builtin.set_fact:
    do_reserved_ips_to_delete: "{{ do_reserved_ips_to_delete | default([]) + [item.ip] }}"
  loop: "{{ do_reserved_ips_json_response.json.floating_ips }}"
  when: item.droplet.name == hostname
  delegate_to: localhost
  no_log: true
  failed_when: false

- ansible.builtin.include_role:
    name: inviqa_digitalocean_reserved_ip
    tasks_from: delete_reserved_ip
  when: do_reserved_ips_to_delete is defined

- name: Wait after Reserved IP deletion before deleting droplets
  ansible.builtin.pause:
    prompt: "Waiting a few seconds after the Reserved IP deletion before deleting the droplets"
    seconds: 10

# Deleting Test Droplets
- name: Retrive The List Of Droplets With Test Tag
  ansible.builtin.uri:
    url: "{{ digital_ocean_api_base_url }}/droplets?tag_name={{ do_test_tag }}"
    headers:
      Content-Type: 'application/json'
      Authorization: "Bearer {{ digital_ocean_api_token }}"
    body_format: json
    method: GET
    status_code:
      - 200
    follow_redirects: all
    return_content: true
    timeout: 60
  delegate_to: localhost
  register: do_droplets_with_test_tag_json_response
  run_once: true

- name: Retrive the ID assigned to the Test Droplet
  ansible.builtin.set_fact:
    droplet_id_with_test_tag: "{{ item.id }}"
  loop: "{{ do_droplets_with_test_tag_json_response.json.droplets }}"
  when: item.name == hostname
  delegate_to: localhost
  no_log: true

- name: Delete the Test Droplet
  ansible.builtin.uri:
    url: "{{ digital_ocean_api_base_url }}/droplets/{{ droplet_id_with_test_tag }}"
    headers:
      Content-Type: 'application/json'
      Authorization: "Bearer {{ digital_ocean_api_token }}"
    body_format: json
    method: DELETE
    follow_redirects: all
    return_content: true
    status_code:
      - 204
    timeout: 60
  delegate_to: localhost
  register: do_test_droplet_delete_json_response
  when: droplet_id_with_test_tag is defined
