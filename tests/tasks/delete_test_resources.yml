---
# Deleting Test Reserved IP

- name: Retrieve the list of existing Reserved IPs
  ansible.builtin.import_role:
    name: inviqa_digitalocean_reserved_ip
    tasks_from: list_reserved_ips

- name: Collect Reserved IPs assigned to this test droplet
  ansible.builtin.set_fact:
    do_reserved_ips_to_delete: "{{ do_reserved_ips_to_delete | default([]) + [item.ip] }}"
  loop: "{{ do_reserved_ips_json_response.json.reserved_ips }}"
  when:
    - item.droplet is not none
    - item.droplet.name in do_test_resource_names | default([hostname])
  delegate_to: localhost
  no_log: true
  failed_when: false

- name: Delete Reserved IPs associated with this test droplet
  ansible.builtin.include_role:
    name: inviqa_digitalocean_reserved_ip
    tasks_from: delete_reserved_ip
  when: do_reserved_ips_to_delete is defined

- name: Wait after Reserved IP deletion before deleting droplets
  ansible.builtin.pause:
    prompt: "Waiting a few seconds after the Reserved IP deletion before deleting the droplets"
    seconds: 10

# Deleting Test Droplets
- name: Retrieve the list of droplets with the test tag
  digitalocean.cloud.droplets_info:
    token: "{{ digital_ocean_api_token }}"
    tag_name: "{{ do_test_tag }}"
  delegate_to: localhost
  register: do_droplets_with_test_tag
  no_log: true
  run_once: true

- name: Retrieve IDs assigned to matching test droplets
  ansible.builtin.set_fact:
    droplets_with_test_tag: >-
      {{
        droplets_with_test_tag | default([])
        + [{
          'id': item.id,
          'name': item.name,
          'region': item.region.slug | default(do_region_id | default('lon1')),
        }]
      }}
  loop: "{{ do_droplets_with_test_tag.droplets }}"
  when: item.name in do_test_resource_names | default([hostname])
  delegate_to: localhost
  no_log: true

- name: Delete matching test droplets
  digitalocean.cloud.droplet:
    token: "{{ digital_ocean_api_token }}"
    droplet_id: "{{ item.id }}"
    name: "{{ item.name }}"
    region: "{{ item.region }}"
    state: absent
    timeout: 60
  delegate_to: localhost
  register: do_test_droplet_delete
  no_log: true
  loop: "{{ droplets_with_test_tag | default([]) }}"
