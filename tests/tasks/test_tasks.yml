---
- name: Retrive the list of existing Reserved IPs
  ansible.builtin.import_role:
    name: inviqa_digitalocean_reserved_ip
    tasks_from: list_reserved_ips

- name: Store the Reserved IP assigned to this droplet
  ansible.builtin.set_fact:
    do_reserved_ips_assigned_to_this_droplet: "{{ item.ip }}"
  loop: "{{ do_reserved_ips_json_response.json.reserved_ips }}"
  when:
    - item.droplet is not none
    - item.droplet.name == hostname
  delegate_to: localhost
  no_log: true

- name: Report the Reserved IP assigned during the test
  ansible.builtin.debug:
    var: do_reserved_ips_assigned_to_this_droplet

- name: Check that the role exposed the Reserved IP fact
  ansible.builtin.assert:
    that:
      - do_droplet_reserved_ip_address is defined
    msg: "The role did not expose the assigned Reserved IP address"
  delegate_to: localhost

- name: Check that the droplet has been assigned with a Reserved IP
  ansible.builtin.assert:
    that:
      - "do_reserved_ips_assigned_to_this_droplet is defined"
    msg: "This droplet wasn't associated to any Reserved IP"
  delegate_to: localhost

- name: Verify outbound routing through Reserved IP
  when:
    - enable_reserved_ip_outbound_routing | bool
  block:
    - name: Query the droplet's outbound public IP address
      ansible.builtin.uri:
        url: https://icanhazip.com/
        method: GET
        return_content: true
        status_code: 200
        timeout: 15
        follow_redirects: all
      register: outbound_public_ip
      retries: 3
      delay: 5
      until: (outbound_public_ip.content | trim | length) > 0

    - name: Report the outbound public IP
      ansible.builtin.debug:
        msg: "Outbound public IP: {{ outbound_public_ip.content | trim }}"

    - name: Assert that outbound IP matches the Reserved IP
      ansible.builtin.assert:
        that:
          - (outbound_public_ip.content | trim) == (do_reserved_ips_assigned_to_this_droplet | trim)
        msg: |
          Outbound IP ({{ outbound_public_ip.content | trim }}) does not match Reserved IP
          ({{ do_reserved_ips_assigned_to_this_droplet | trim }}). Routing may not be configured correctly.

  rescue:
    - name: Report routing verification failure
      ansible.builtin.debug:
        msg:
          - "Outbound routing verification failed. This may indicate:"
          - "1. Network connectivity issues on the droplet"
          - "2. The routing configuration was not applied correctly"
          - "3. DNS resolution issues"
